<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Reset Method</title>

<style>
body {
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:-apple-system, Arial;
  color:#D4AF37;
  text-align:center;
}

/* KONTEJNER */
.wrap {
  animation:fadeIn 0.6s ease;
}

/* LOGO */
.logo {
  width:130px;
  margin-bottom:20px;
  animation:pulse 1.6s infinite;
  filter: drop-shadow(0 0 18px rgba(212,175,55,0.6));
}

/* NASLOV */
.title {
  font-size:20px;
  letter-spacing:2px;
}

/* ANIMACIJE */
@keyframes pulse {
  0% { transform:scale(1); }
  50% { transform:scale(1.05); }
  100% { transform:scale(1); }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
</style>
</head>

<body>

<div class="wrap">
  <img src="icon-512.png" class="logo">
  <div class="title">ENERGY RESET METHOD</div>
</div>

<script>
setTimeout(() => {
  window.location.replace("app.html");
}, 1400);
</script>

</body>
</html>
