<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Energy Reset Method</title>

<!-- PREVIEW (da izgleda kao slika kad se deli) -->
<meta property="og:title" content="Energy Reset Method">
<meta property="og:description" content="Preuzmi i podeli svoj badge">
<meta property="og:image" content="https://nakshon-8.github.io/Energy-Reset-Method/badge-final.png">
<meta property="og:url" content="https://nakshon-8.github.io/Energy-Reset-Method/badge.html">
<meta name="twitter:card" content="summary_large_image">

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
  color: white;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 15px;
}

.btn {
  display: block;
  padding: 15px;
  margin-top: 12px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
}

.download {
  background: #00c853;
  color: white;
}

.share {
  background: #2962ff;
  color: white;
  border: none;
}

.site {
  background: gold;
  color: black;
}
</style>
</head>

<body>

<div class="container">

  <!-- BADGE SLIKA -->
  <img src="badge-final.png" alt="Energy Reset Badge">

  <!-- DOWNLOAD -->
  <a href="badge-final.png" download class="btn download">
    📥 Preuzmi badge
  </a>

  <!-- SHARE -->
  <button class="btn share" onclick="shareBadge()">
    📤 Podeli link
  </button>

  <!-- SAJT -->
  <a href="https://nakshon-8.github.io/Energy-Reset-Method/" class="btn site">
    🌐 Idi na sajt
  </a>

</div>

<script>
function shareBadge() {
  const url = "https://nakshon-8.github.io/Energy-Reset-Method/badge.html";

  if (navigator.share) {
    navigator.share({
      title: "Energy Reset Method",
      text: "Pogledaj ovo 👇",
      url: url
    });
  } else {
    navigator.clipboard.writeText(url);
    alert("Link kopiran – nalepi ga i podeli.");
  }
}
</script>

</body>
</html>
