<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edicija</title>

<style>
body { margin:0; background:#000; font-family:-apple-system,Arial; color:#fff; }

.header { display:flex; justify-content:space-between; padding:16px; border-bottom:1px solid #222; }
.back, .home { font-size:22px; cursor:pointer; }

.logo { width:120px; margin:30px auto; display:block; }

.container { max-width:420px; margin:auto; padding:20px; }

.card {
  background:#111;
  padding:24px;
  border-radius:24px;
  text-align:center;
}

h1 { color:#D4AF37; }

.btn {
  margin-top:12px;
  padding:16px;
  width:100%;
  border-radius:16px;
  font-size:16px;
}

.main { background:#D4AF37; color:#000; border:none; }
.secondary { background:#000; color:#D4AF37; border:1px solid #D4AF37; }
</style>
</head>

<body>

<div class="header">
<div class="back" onclick="location.href='app.html'">←</div>
<div class="home" onclick="location.href='app.html'">🏠</div>
</div>

<img src="icon-512.png" class="logo">

<div class="container">
<div class="card">

<h1>Knjige</h1>

<button class="btn main" onclick="window.open('https://payhip.com/b/DYJib')">
Besplatna knjiga
</button>

<button class="btn secondary" onclick="window.open('https://payhip.com/Serpentas')">
Sve knjige
</button>

</div>
</div>

</body>
</html>
