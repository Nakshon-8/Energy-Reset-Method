<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Energy Reset Method</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
background:#000;
font-family:Arial,sans-serif;
overflow-x:hidden;
height:100%;
}

.app{
width:100%;
max-width:780px;
margin:auto;
background:#000;
min-height:100vh;
position:relative;
}

.page{
display:none;
position:relative;
width:100%;
}

.page.active{
display:block;
}

.screen{
width:100%;
display:block;
height:auto;
}

.click-zone{
position:absolute;
cursor:pointer;
border-radius:20px;
}

/* HOME */
.enter-btn{
left:16%;
bottom:11%;
width:68%;
height:7%;
}

/* WELCOME NAV */
.nav-home{
left:3%;
bottom:1.2%;
width:22%;
height:6%;
}

.nav-biblioteka{
left:27%;
bottom:1.2%;
width:22%;
height:6%;
}

.nav-rad{
left:51%;
bottom:1.2%;
width:22%;
height:6%;
}

.nav-kontakt{
left:75%;
bottom:1.2%;
width:22%;
height:6%;
}

/* HOME BUTTON */
.open-library{
left:15%;
bottom:18%;
width:70%;
height:7%;
}

/* BIBLIOTEKA */
.put-book{
left:6%;
top:41%;
width:40%;
height:27%;
}

.bukvar-book{
right:6%;
top:41%;
width:40%;
height:27%;
}

.unlock-all{
left:12%;
bottom:13%;
width:76%;
height:8%;
}

/* RAD SA MNOM */
.personal-zone{
left:8%;
top:45%;
width:84%;
height:16%;
}

.business-zone{
left:8%;
top:64%;
width:84%;
height:16%;
}

/* KONTAKT */
.whatsapp-zone{
left:8%;
top:42%;
width:84%;
height:10%;
}

.instagram-zone{
left:8%;
top:54%;
width:84%;
height:10%;
}

.email-zone{
left:8%;
top:66%;
width:84%;
height:10%;
}

</style>
</head>
<body>

<div class="app">

<!-- HOME -->
<section id="home" class="page active">
<img src="home.png" class="screen" alt="home">

<div class="click-zone enter-btn" onclick="showPage('welcome')"></div>
</section>

<!-- WELCOME -->
<section id="welcome" class="page">
<img src="welcome.png" class="screen" alt="welcome">

<div class="click-zone open-library" onclick="showPage('biblioteka')"></div>

<div class="click-zone nav-home" onclick="showPage('welcome')"></div>
<div class="click-zone nav-biblioteka" onclick="showPage('biblioteka')"></div>
<div class="click-zone nav-rad" onclick="showPage('rad')"></div>
<div class="click-zone nav-kontakt" onclick="showPage('kontakt')"></div>
</section>

<!-- BIBLIOTEKA -->
<section id="biblioteka" class="page">
<img src="biblioteka.png" class="screen" alt="biblioteka">

<div class="click-zone put-book"></div>

<div class="click-zone bukvar-book" onclick="window.open('https://payhip.com','_blank')"></div>

<div class="click-zone unlock-all" onclick="window.open('https://energyresetmethod.com','_blank')"></div>

<div class="click-zone nav-home" onclick="showPage('welcome')"></div>
<div class="click-zone nav-biblioteka" onclick="showPage('biblioteka')"></div>
<div class="click-zone nav-rad" onclick="showPage('rad')"></div>
<div class="click-zone nav-kontakt" onclick="showPage('kontakt')"></div>
</section>

<!-- RAD SA MNOM -->
<section id="rad" class="page">
<img src="rad-sa-mnom.png" class="screen" alt="rad sa mnom">

<div class="click-zone personal-zone" onclick="window.open('https://energyresetmethod.com/personalni','_blank')"></div>

<div class="click-zone business-zone" onclick="window.open('https://energyresetmethod.com/poslovni','_blank')"></div>

<div class="click-zone nav-home" onclick="showPage('welcome')"></div>
<div class="click-zone nav-biblioteka" onclick="showPage('biblioteka')"></div>
<div class="click-zone nav-rad" onclick="showPage('rad')"></div>
<div class="click-zone nav-kontakt" onclick="showPage('kontakt')"></div>
</section>

<!-- KONTAKT -->
<section id="kontakt" class="page">
<img src="kontakt.png" class="screen" alt="kontakt">

<div class="click-zone whatsapp-zone" onclick="window.open('https://wa.me/381000000000','_blank')"></div>

<div class="click-zone instagram-zone" onclick="window.open('https://instagram.com','_blank')"></div>

<div class="click-zone email-zone" onclick="window.location.href='mailto:info@energyresetmethod.com'"></div>

<div class="click-zone nav-home" onclick="showPage('welcome')"></div>
<div class="click-zone nav-biblioteka" onclick="showPage('biblioteka')"></div>
<div class="click-zone nav-rad" onclick="showPage('rad')"></div>
<div class="click-zone nav-kontakt" onclick="showPage('kontakt')"></div>
</section>

</div>

<script>
function showPage(id){
document.querySelectorAll('.page').forEach(page=>{
page.classList.remove('active');
});

document.getElementById(id).classList.add('active');
window.scrollTo(0,0);
}
</script>

</body>
</html>
