<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Energy Reset</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">

<!-- iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Energy Reset">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body {
  margin:0;
  background:radial-gradient(circle at top, #111, #000);
  font-family:-apple-system, BlinkMacSystemFont, Arial;
  color:#fff;
}

.container {
  max-width:420px;
  margin:auto;
  padding:20px;
  min-height:100vh;
}

.header {
  display:flex;
  align-items:center;
  margin-bottom:20px;
}

.back {
  font-size:22px;
  margin-right:10px;
  cursor:pointer;
}

.card {
  background:rgba(20,20,20,0.9);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:24px;
  box-shadow:0 0 60px rgba(212,175,55,0.1);
  animation:fade 0.4s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(15px);}
  to {opacity:1;}
}

h1 { color:#D4AF37; }

.btn {
  margin-top:12px;
  padding:14px;
  width:100%;
  border-radius:14px;
  font-size:15px;
}

.main {
  background:#D4AF37;
  color:#000;
  border:none;
}

.secondary {
  background:#000;
  color:#D4AF37;
  border:1px solid #D4AF37;
}

.cta {
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:420px;
}
.cta button {
  width:100%;
  padding:16px;
  border-radius:16px;
  background:#D4AF37;
  color:#000;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<img src="icon-192.png" style="width:80px;margin:auto;display:block;">
<h1 style="text-align:center;">ENERGY RESET</h1>

<div class="card">

<button class="btn main" onclick="location.href='personalni.html'">👤 Personalni rad</button>
<button class="btn secondary" onclick="location.href='poslovni.html'">💼 Poslovni rad</button>
<button class="btn secondary" onclick="location.href='edicija.html'">📘 Edicija</button>
<button class="btn secondary" onclick="location.href='kontakt.html'">✉️ Kontakt</button>

</div>

</div>

</body>

<!-- iPhone INSTALL BAR -->
<div id="iphoneInstall" style="
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
color:#fff;
padding:16px;
display:none;
z-index:9999;
border-top:2px solid #D4AF37;
">

<b>Instaliraj aplikaciju</b><br>
Klikni Share ⬆️ pa Add to Home Screen

</div>

<script>
// REGISTER SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// INSTALL DETECT
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

// iPhone DETECT
function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches 
      || window.navigator.standalone === true;
}

window.addEventListener('load', () => {

  // iPhone guide
  if (isIOS() && !isStandalone()) {
    setTimeout(() => {
      document.getElementById('iphoneInstall').style.display = 'block';
    }, 1500);
  }

  // sakrij install ako je već instalirano
  if (isStandalone()) {
    const iphone = document.getElementById('iphoneInstall');
    if (iphone) iphone.style.display = 'none';
  }

});
</script>

</body>
</html>
