<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Reset Method</title>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,Arial;
}

/* BACKGROUND GLOW */
.bg{
  position:fixed;
  width:500px;
  height:500px;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  background: radial-gradient(circle, rgba(212,175,55,0.35), transparent 70%);
  filter: blur(80px);
  animation:pulse 6s infinite ease-in-out;
  z-index:0;
}

@keyframes pulse{
  0%{ transform:translate(-50%,-50%) scale(1);}
  50%{ transform:translate(-50%,-50%) scale(1.1);}
  100%{ transform:translate(-50%,-50%) scale(1);}
}

/* SCREEN */
.screen{
  display:none;
  text-align:center;
  padding:40px 20px 120px;
  position:relative;
  z-index:1;
}
.active{ display:block; }

/* LOGO */
.logo{
  width:170px;
  margin:40px auto 20px;
  display:block;
  filter:
    drop-shadow(0 0 30px rgba(212,175,55,0.9))
    drop-shadow(0 0 80px rgba(212,175,55,0.5));
}

/* TEXT */
h2{
  color:#D4AF37;
  letter-spacing:2px;
}
p{
  opacity:.7;
  max-width:320px;
  margin:10px auto;
}

/* BUTTON BASE */
.btn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:15px auto;
  padding:16px 18px;
  width:90%;
  max-width:340px;
  border-radius:25px;
  font-size:16px;
}

/* MAIN BUTTON */
.main{
  background: linear-gradient(90deg,#D4AF37,#f6d365);
  color:#000;
  border:none;
  box-shadow:0 0 20px rgba(212,175,55,0.4);
}

/* SECONDARY */
.secondary{
  background:#000;
  color:#D4AF37;
  border:1px solid rgba(212,175,55,0.5);
}

/* ICON STYLE */
.icon{
  font-size:18px;
  margin-right:10px;
}

/* BUTTON CONTENT */
.btn span{
  flex:1;
  text-align:left;
}

/* MENU */
.menu{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#000;
  border-top:1px solid #222;
  padding:10px 0;
}

.menu div{
  color:#888;
  font-size:12px;
}

.menu .active{
  color:#D4AF37;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- HOME -->
<div id="home" class="screen active">

<img src="logo.png" class="logo">

<h2>ENERGY RESET</h2>
<p>METHOD</p>

<button class="btn main" onclick="nav('personalni')">
  <div class="icon">👤</div>
  <span>Personalni rad</span>
  ›
</button>

<button class="btn secondary" onclick="nav('poslovni')">
  <div class="icon">💼</div>
  <span>Poslovni rad</span>
  ›
</button>

<button class="btn secondary" onclick="nav('edicija')">
  <div class="icon">📖</div>
  <span>Edicija</span>
  ›
</button>

<button class="btn secondary" onclick="nav('kontakt')">
  <div class="icon">✉️</div>
  <span>Kontakt</span>
  ›
</button>

</div>

<!-- PERSONALNI -->
<div id="personalni" class="screen">

<img src="logo.png" class="logo">

<h2>Stabilnost</h2>
<p>Povratak fokusa i unutrašnjeg mira.</p>

<button class="btn main" onclick="window.open('https://wa.me/38163459383','_blank')">
Zakaži termin
</button>

<button class="btn secondary" onclick="window.open('https://nakshon-8.github.io/Energy-Reset-Method/','_blank')">
Saznaj više
</button>

</div>

<!-- POSLOVNI -->
<div id="poslovni" class="screen">

<img src="logo.png" class="logo">

<h2>Jasnoća</h2>
<p>Odluke i stabilan pravac.</p>

<button class="btn main" onclick="window.open('https://wa.me/38163459383','_blank')">
Kontakt
</button>

<button class="btn secondary" onclick="window.open('https://nakshon-8.github.io/Energy-Reset-Method/','_blank')">
Saznaj više
</button>

</div>

<!-- EDICIJA -->
<div id="edicija" class="screen">

<img src="logo.png" class="logo">

<h2>Znanje</h2>

<button class="btn main" onclick="window.open('https://payhip.com/b/DYJib','_blank')">
Besplatna knjiga
</button>

<button class="btn secondary" onclick="window.open('https://payhip.com/Serpentas','_blank')">
Sve knjige
</button>

</div>

<!-- KONTAKT -->
<div id="kontakt" class="screen">

<img src="logo.png" class="logo">

<h2>Kontakt</h2>

<button class="btn main" onclick="window.open('https://wa.me/38163459383','_blank')">
WhatsApp
</button>

<button class="btn secondary" onclick="window.open('mailto:serpentas9@gmail.com','_blank')">
Email
</button>

</div>

<!-- MENU -->
<div class="menu">
<div onclick="nav('home')" id="m-home" class="active">Home</div>
<div onclick="nav('personalni')" id="m-p">Personalni</div>
<div onclick="nav('poslovni')" id="m-b">Poslovni</div>
<div onclick="nav('edicija')" id="m-e">Edicija</div>
<div onclick="nav('kontakt')" id="m-k">Kontakt</div>
</div>

<script>
function nav(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.menu div').forEach(m=>m.classList.remove('active'));

  if(id==='home') document.getElementById('m-home').classList.add('active');
  if(id==='personalni') document.getElementById('m-p').classList.add('active');
  if(id==='poslovni') document.getElementById('m-b').classList.add('active');
  if(id==='edicija') document.getElementById('m-e').classList.add('active');
  if(id==='kontakt') document.getElementById('m-k').classList.add('active');
}
</script>

</body>
</html>
